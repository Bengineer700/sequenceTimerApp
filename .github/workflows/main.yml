name: Deploy to GitHub Pages

# Runs on every push to the main branch.
on:
  push:
    branches: [main]
  workflow_dispatch:   # lets you trigger a deploy manually from the Actions tab

# Permissions the Pages deployment needs.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time; a newer push cancels an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Stamp the commit hash into the service worker cache version
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          echo "Setting CACHE_VERSION to sequence-${SHORT_SHA}"
          sed -i "s/const CACHE_VERSION = '[^']*';/const CACHE_VERSION = 'sequence-${SHORT_SHA}';/" sw.js
          grep CACHE_VERSION sw.js | head -1

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload the site as a Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .    # the whole repo root (index.html, sw.js, manifest, icons)

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
